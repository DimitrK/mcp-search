name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Weekly dependency audit
    - cron: '0 2 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  FORCE_COLOR: 1

jobs:
  # 🔍 Code Quality & Security
  lint-and-typecheck:
    name: 📋 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --include=optional

      - name: 🎨 Check formatting
        run: npm run format:check

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🔎 TypeScript check
        run: npm run typecheck

  # 🛡️ Security Scanning
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --include=optional

      - name: 🕵️ NPM Audit
        run: npm audit --audit-level moderate
        continue-on-error: true

      - name: 🔍 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: 🏗️ Build for CodeQL
        run: npm run build

      - name: 🔎 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  # 🧪 Comprehensive Testing Matrix
  test-matrix:
    name: 🧪 Tests (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x', '24.x']
        os: [ubuntu-latest, macos-latest]
        include:
          # Add performance testing on the stable Linux lane
          - node-version: '22.x'
            os: ubuntu-latest
            run-performance: true
          # Run optional browser-backed SPA testing where the Node 24 Linux lane has coverage
          - node-version: '24.x'
            os: ubuntu-latest
            install_playwright: true

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --include=optional

      - name: 🎭 Install Playwright browsers for SPA tests
        if: matrix.install_playwright
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: 🏗️ Build project
        run: npm run build

      - name: 🧪 Run unit tests
        run: npm run test:unit
        env:
          MCP_SEARCH_RUN_BROWSER_TESTS: ${{ matrix.install_playwright && 'true' || 'false' }}

      - name: 🔗 Run integration tests
        run: npm run test:integration
        env:
          # Mock environment for tests
          SEARCH_PROVIDER: google
          SEARCH_ENGINE_API_KEY: test-key
          GOOGLE_SEARCH_ENGINE_ID: test-engine
          EMBEDDING_SERVER_URL: http://localhost:3000
          EMBEDDING_SERVER_API_KEY: test-key
          EMBEDDING_MODEL_NAME: test-model

      - name: ⚡ Run performance tests
        if: matrix.run-performance
        run: npm run test:performance
        env:
          SEARCH_PROVIDER: google
          SEARCH_ENGINE_API_KEY: test-key
          GOOGLE_SEARCH_ENGINE_ID: test-engine
          EMBEDDING_SERVER_URL: http://localhost:3000
          EMBEDDING_SERVER_API_KEY: test-key
          EMBEDDING_MODEL_NAME: test-model

      - name: 📊 Generate coverage report
        if: matrix.node-version == '22.x' && matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
        env:
          SEARCH_PROVIDER: google
          SEARCH_ENGINE_API_KEY: test-key
          GOOGLE_SEARCH_ENGINE_ID: test-engine
          EMBEDDING_SERVER_URL: http://localhost:3000
          EMBEDDING_SERVER_API_KEY: test-key
          EMBEDDING_MODEL_NAME: test-model

      - name: 📈 Upload coverage to Codecov
        if: matrix.node-version == '22.x' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # 🐳 Docker Build & Test
  docker-test:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mcp-search:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Test Docker image
        run: |
          docker run --rm \
            -e SEARCH_PROVIDER=google \
            -e SEARCH_ENGINE_API_KEY=test \
            -e GOOGLE_SEARCH_ENGINE_ID=test \
            -e EMBEDDING_SERVER_URL=http://test \
            -e EMBEDDING_SERVER_API_KEY=test \
            -e EMBEDDING_MODEL_NAME=test \
            mcp-search:test node dist/cli.js health

  # 📦 NPM Publish (on tags)
  publish-npm:
    name: 📦 Publish to NPM
    runs-on: ubuntu-latest
    needs: [test-matrix, security-scan, docker-test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 🔧 Install dependencies
        run: npm ci --include=optional

      - name: 🏗️ Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🚀 Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # 🐳 Docker Publish (on tags)
  publish-docker:
    name: 🐳 Publish Docker Image
    runs-on: ubuntu-latest
    needs: [test-matrix, security-scan, docker-test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🧩 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dimitrisk/mcp-search
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: 🚀 Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha, scope=mcp-search
          cache-to: type=gha,mode=max,scope=mcp-search,ignore-error=true
        env:
          NODE_ENV: production

  # 🎉 Create GitHub Release
  create-release:
    name: 🎉 Create Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🎉 Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## 📦 Installation

            ```bash
            npm install -g @dimitrk/mcp-search@${{ github.ref_name }}
            ```

            ## 🐳 Docker

            ```bash
            docker pull dimitrisk/mcp-search:${{ github.ref_name }}
            ```

            ## 📋 Full Changelog

            **Full Changelog**: https://github.com/${{ github.repository }}/releases
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
